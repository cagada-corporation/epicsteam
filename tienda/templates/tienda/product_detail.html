{% extends 'tienda/base.html' %}

{% block content %}

<style>

.detail-container{
    max-width:1100px;
    margin:auto;
}

.detail-card{
    background:#161b22;
    border-radius:20px;
    overflow:hidden;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
    padding:30px;
    border:1px solid #30363d;
}

.detail-image img{
    width:100%;
    height:600px;
    object-fit:cover;
    border-radius:20px;
}

.detail-info{
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.game-title{
    font-size:42px;
    font-weight:700;
    margin-bottom:20px;
}

.game-description{
    color:#c9d1d9;
    line-height:1.8;
    margin-bottom:25px;
    font-size:17px;
}

.game-price{
    font-size:35px;
    color:#3fb950;
    font-weight:700;
    margin-bottom:20px;
}

.game-stock{
    color:#8b949e;
    margin-bottom:30px;
}

.buy-btn{
    background:#00bfff;
    border:none;
    padding:15px;
    border-radius:12px;
    color:white;
    font-size:17px;
    font-weight:600;
    text-decoration:none;
    text-align:center;
    transition:0.3s;
}

.buy-btn:hover{
    transform:scale(1.03);
}

@media(max-width:900px){

    .detail-card{
        grid-template-columns:1fr;
    }

    .detail-image img{
        height:400px;
    }

}

</style>

<div class="detail-container">

    <div class="detail-card">

        <div class="detail-image">

            {% if product.image %}

                <img src="{{ product.image.url }}"
                     alt="{{ product.name }}">

            {% endif %}

        </div>

        <div class="detail-info">

            <div class="game-title">
                {{ product.name }}
            </div>

            <div class="game-description">
                {{ product.description }}
            </div>

            <div class="game-price">
                ${{ product.price }}
            </div>

            <div class="game-stock">
                Stock disponible: {{ product.stock }}
            </div>

            <a href="{% url 'add_to_cart' product.id %}"
               class="buy-btn">

               Agregar al carrito

            </a>

        </div>

    </div>

</div>

{% endblock %}
