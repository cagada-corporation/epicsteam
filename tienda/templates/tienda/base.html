<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EpicSteam</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#0f172a;
            color:white;
        }

        .navbar{
            background:#111827;
        }

        .card{
            background:#1e293b;
            border:none;
            border-radius:0;
            color:white;
            transition:0.3s;
        }

        .card:hover{
            transform:scale(1.02);
        }

        .game-img{
            height:220px;
            object-fit:cover;
        }

        .btn-steam{
            background:#2563eb;
            color:white;
            border:none;
            border-radius:0;
        }

        .btn-steam:hover{
            background:#1d4ed8;
        }

    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            EPICSTEAM
        </a>

        <div class="d-flex align-items-center">

            {% if user.is_authenticated %}

                <span class="text-white me-3">
                    Hola {{ user.username }}
                </span>

                <a href="{% url 'cart_detail' %}"
                   class="btn btn-outline-light me-2">
                   Carrito
                </a>

                {% if user.is_seller %}
                    <a href="{% url 'dashboard' %}"
                       class="btn btn-warning me-2">
                       Dashboard
                    </a>
                {% endif %}

                <a href="{% url 'logout' %}"
                   class="btn btn-danger btn-sm">
                   Logout
                </a>

            {% else %}

                <a href="{% url 'login' %}"
                   class="btn btn-outline-light btn-sm me-2">
                   Login
                </a>

                <a href="{% url 'register' %}"
                   class="btn btn-primary btn-sm">
                   Registro
                </a>

            {% endif %}

        </div>

    </div>

</nav>

<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
